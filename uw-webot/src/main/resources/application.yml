# Webot 自动化配置
# 字段以 uw.webot.conf.WebotProperties 及各 *Config 类为准。
uw:
  webot:
    # 是否启用 Webot 自动化功能
    enabled: true

    # BotPool 配置 (WebotProperties.BotPoolProperties)
    bot-pool:
      # 每个浏览器组的最大 Browser 数量 (1-20)
      max-browsers-per-group: 5
      # 每个 Browser 的最大 BrowserTab 数量 (1-50)
      max-tabs-per-browser: 20

    # 会话管理配置 (WebotProperties.SessionProperties)
    session:
      # 是否启用分布式会话 (基于 FusionCache)
      distributed: false
      # 默认会话配置 (SessionConfig)
      default-session:
        # 会话过期时间 (ISO-8601 duration)
        expire-time: P30D
        # 浏览器配置 (BrowserConfig)
        browser-config:
          # 浏览器类型: chromium, firefox, webkit
          browser-type: chromium
          # 是否无头模式
          headless: true
          # 视口宽度
          viewport-width: 1920
          # 视口高度
          viewport-height: 1080
          # 是否启用 JavaScript
          java-script-enabled: true
          # User-Agent (留空使用浏览器默认)
          user-agent:
          # 语言 (如 zh-CN)
          locale:
          # 时区 (如 Asia/Shanghai)
          timezone:
          # 额外启动参数
          args:

    # 验证码服务配置 (Map<String, CaptchaConfig>)
    # key 为业务方在 SessionConfig.captchaConfigKey 中引用的名称
    captcha: {}
    # 示例:
    # captcha:
    #   default:
    #     service-type: capsolver   # ocr | twocaptcha | capsolver
    #     api-key: your-api-key
    #     max-retries: 3
    #     max-timeout: PT2M

    # 反检测服务配置 (Map<String, StealthConfig>)
    # key 为业务方在 SessionConfig.stealthConfigKey 中引用的名称
    stealth: {}
    # 示例:
    # stealth:
    #   default:
    #     hide-web-driver: true
    #     webgl-spoofing: true
    #     plugin-spoofing: true
    #     font-spoofing: true
    #     fingerprint-randomization: false
    #     user-agents:
    #     screen-resolutions:
    #     timezones:

    # 代理服务配置 (Map<String, ProxyConfig>)
    # key 为业务方在 SessionConfig.proxyConfigKey 中引用的名称
    proxy: {}
    # 示例:
    # proxy:
    #   default:
    #     max-failures: 3
    #     health-check-interval: PT5M
    #     servers:
    #       - type: HTTPS        # http | https | socks4 | socks5
    #         host: proxy.example.com
    #         port: 8080
    #         username:
    #         password:
